<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoDupe | TreeSimulator</title>
    <link rel="icon" type="image/png" href="../assets/title.png">
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <style>
        :root { --neon: #00ffff; --bg: #000a0a; --dark: #000505; }
        
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background: #000; }

        /* Navigation */
        #hub-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 10px 20px; background: rgba(0, 0, 0, 0.8);
            color: var(--neon); border: 1px solid var(--neon);
            text-decoration: none; font-size: 0.8em; font-weight: bold;
            letter-spacing: 2px; z-index: 500; transition: 0.3s;
        }
        #hub-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }

        /* UI HUD */
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: var(--neon); background: rgba(0,15,15,0.8);
            padding: 15px; border: 1px solid var(--neon); display: none;
            pointer-events: none; z-index: 10;
        }

        /* Menu Overlay */
        #menu-overlay {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, #001a1a, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: var(--neon); text-align: center;
        }

        #play-btn {
            padding: 15px 45px; font-size: 20px; font-weight: bold;
            background: transparent; border: 2px solid var(--neon); color: var(--neon);
            cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 5px;
        }
        #play-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 30px var(--neon); }

        .footer { 
            position: absolute; bottom: 15px; width: 100%; text-align: center; 
            font-size: 0.8em; letter-spacing: 1px; pointer-events: none; opacity: 0.5;
        }
    </style>
</head>
<body>

<a href="../index.html" id="hub-btn">BACK TO HUB</a>

<div id="menu-overlay">
    <h1 style="letter-spacing: 12px; text-shadow: 0 0 20px var(--neon); margin: 0;">TREE_SIMULATOR</h1>
    <p style="opacity: 0.6; margin-top: 10px; margin-bottom: 30px;">[ PERFORMANCE_MODE_ACTIVE ]</p>
    <button id="play-btn" onclick="startGame()">INITIALIZE</button>
    <div class="footer">DESIGNED BY <b>SKITXOE</b></div>
</div>

<div id="ui">
    <span style="font-size: 10px; opacity: 0.7;">DATA_EXTRACTED</span><br>
    <span style="font-size: 24px; font-weight: bold;">$<span id="money">0</span></span>
</div>

<script>
let stats = { money: 0 };
let gameStarted = false;

// 1. Core Scene Setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000505);
// Fog is now lighter and starts further out for better visibility
scene.fog = new THREE.Fog(0x000000, 30, 160);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// 2. Lighting
scene.add(new THREE.AmbientLight(0x404040, 2.5));
const dirLight = new THREE.DirectionalLight(0x00ffff, 1);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

// 3. Environment
const grid = new THREE.GridHelper(400, 40, 0x00ffff, 0x001515);
scene.add(grid);

// 4. Optimized "Data Trees"
let trees = [];
const trunkGeo = new THREE.CylinderGeometry(0.2, 0.2, 3, 6);
const leafGeo = new THREE.OctahedronGeometry(1.5, 0); 
const trunkMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
const leafMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x003333 });

function createTree() {
    const group = new THREE.Group();
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    const leaves = new THREE.Mesh(leafGeo, leafMat);
    leaves.position.y = 2.5;
    group.add(trunk, leaves);
    
    let rx = (Math.random() - 0.5) * 160;
    let rz = (Math.random() - 0.5) * 160;
    group.position.set(rx, 0, rz);
    
    scene.add(group);
    return { obj: group, x: rx, z: rz };
}

// Generate 45 trees (Good balance of density vs performance)
for(let i=0; i<45; i++) trees.push(createTree());

// 5. Movement & Controls
let player = { x: 0, z: 15, yaw: 0 };
let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

document.addEventListener("mousemove", e => {
    if(document.pointerLockElement === document.body) {
        player.yaw -= e.movementX * 0.002;
        camera.rotation.set(0, player.yaw, 0);
    }
});

function startGame() {
    gameStarted = true;
    document.getElementById("menu-overlay").style.display = "none";
    document.getElementById("ui").style.display = "block";
    document.body.requestPointerLock();
}

function update() {
    if(!gameStarted) return;

    let speed = keys["shift"] ? 0.7 : 0.3;
    // WASD Movement
    if(keys["w"]) { player.x -= Math.sin(player.yaw) * speed; player.z -= Math.cos(player.yaw) * speed; }
    if(keys["s"]) { player.x += Math.sin(player.yaw) * speed; player.z += Math.cos(player.yaw) * speed; }
    if(keys["a"]) { player.x -= Math.cos(player.yaw) * speed; player.z += Math.sin(player.yaw) * speed; }
    if(keys["d"]) { player.x += Math.cos(player.yaw) * speed; player.z -= Math.sin(player.yaw) * speed; }

    camera.position.set(player.x, 3, player.z);

    // Collision / Harvest Check
    trees.forEach(t => {
        let dist = Math.sqrt((player.x - t.x)**2 + (player.z - t.z)**2);
        if(dist < 2.5) {
            stats.money += 1;
            document.getElementById("money").innerText = stats.money;
            
            // Reposition harvested tree
            t.x = (Math.random() - 0.5) * 160;
            t.z = (Math.random() - 0.5) * 160;
            t.obj.position.set(t.x, 0, t.z);
        }
        // Small animation for leaves
        t.obj.children[1].rotation.y += 0.01;
    });
}

function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}
animate();

// Handle Window Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
