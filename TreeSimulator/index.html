<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EchoDupe | Tree Simulator</title>
    <link rel="icon" type="image/png" href="../assets/title.png">
    <style>
        :root { --neon: #00ffff; --gold: #ffd700; }
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: #87CEEB; color: white; user-select: none; }
        
        #ui {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.6); padding: 15px 25px; 
            border-radius: 15px; border-left: 5px solid var(--neon); z-index: 10;
            backdrop-filter: blur(10px);
        }

        .menu-gui {
            display: none; position: fixed; left: 50%; top: 50%;
            transform: translate(-50%, -50%); width: 320px;
            background: white; color: #333; border-radius: 25px;
            padding: 30px; z-index: 1000; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .btn {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #f0f0f0; border: none; border-radius: 12px;
            color: #333; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn:hover { background: var(--neon); color: black; }
        .btn-reset { color: red; margin-top: 20px; font-size: 0.8em; opacity: 0.6; cursor: pointer; }

        #crosshair {
            position: fixed; top: 50%; left: 50%;
            width: 10px; height: 10px; border: 2px solid white;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 5;
        }
    </style>
</head>
<body>

<div id="crosshair"></div>

<div id="ui">
    <div style="font-size: 0.8em; font-weight: bold; opacity: 0.8;">CASH</div>
    <div style="font-size: 2em; font-weight: 900; color: var(--neon);">$<span id="money">0</span></div>
    <div style="font-size: 0.7em; margin-top: 5px;">[E] SHOP | [P] SETTINGS</div>
</div>

<div id="store-gui" class="menu-gui">
    <h2 style="margin-top:0">The Shop</h2>
    <div class="btn" onclick="buyWorker()">Hire Worker ($<span id="w-cost">25</span>)</div>
    <div class="btn" onclick="doRebirth()" style="color: #b8860b;">Rebirth ($5,000)</div>
    <button class="btn" onclick="closeMenus()" style="background:#333; color:white;">Close</button>
</div>

<div id="settings-gui" class="menu-gui">
    <h2>Settings</h2>
    <div class="btn" onclick="closeMenus()">Resume Game</div>
    <div class="btn-reset" onclick="resetGame()">RESET ALL PROGRESS</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="game.js"></script>

<script>
    function closeMenus() {
        document.getElementById('store-gui').style.display = 'none';
        document.getElementById('settings-gui').style.display = 'none';
        document.body.requestPointerLock();
    }
</script>
</body>
</html>
