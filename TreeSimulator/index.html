<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EchoDupe | Galactic Harvest</title>
    <link rel="icon" type="image/png" href="../assets/title.png">
    <style>
        :root { --neon: #00ffff; --gold: #ffd700; }
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background: #000; color: white; }
        
        #hub-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 10px 20px; background: rgba(0,0,0,0.8);
            color: var(--neon); border: 1px solid var(--neon);
            text-decoration: none; font-weight: bold; z-index: 500;
        }

        #ui {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); padding: 20px; 
            border-left: 5px solid var(--neon); z-index: 10;
        }

        .menu-gui {
            display: none; position: fixed; left: 50%; top: 50%;
            transform: translate(-50%, -50%); width: 350px;
            background: rgba(0, 10, 20, 0.95); border: 2px solid var(--neon);
            padding: 30px; z-index: 1000; box-shadow: 0 0 50px rgba(0,255,255,0.2);
        }

        .btn {
            width: 100%; padding: 12px; margin: 10px 0;
            background: rgba(0,255,255,0.1); border: 1px solid var(--neon);
            color: white; cursor: pointer; font-family: inherit;
        }
        .btn:hover { background: var(--neon); color: black; }

        #prompt {
            position: absolute; bottom: 15%; width: 100%; text-align: center;
            color: var(--neon); font-size: 1.2em; pointer-events: none;
        }
    </style>
</head>
<body>

<a href="../index.html" id="hub-btn">BACK TO HUB</a>

<div id="ui">
    <div style="font-size: 0.8em; opacity: 0.7;">GALACTIC_CREDITS</div>
    <div style="font-size: 2.5em; font-weight: bold;">$<span id="money">0</span></div>
    <div style="color: var(--gold);">REBIRTHS: <span id="rebirths">0</span></div>
    <div style="font-size: 0.8em; margin-top: 5px;">[K] TELEPORT TO SHOP</div>
</div>

<div id="prompt">CLICK TO START | [E] SHOP | [P] SETTINGS</div>

<div id="store-gui" class="menu-gui">
    <h2 style="color:var(--neon)">STATION_TRADING</h2>
    <div class="btn" onclick="buyWorker()">Hire Astro-Bot ($<span id="w-cost">25</span>)</div>
    <div class="btn" onclick="buyAxe()">Upgrade Laser ($<span id="a-cost">100</span>)</div>
    <div class="btn" onclick="doRebirth()" style="border-color:var(--gold); color:var(--gold);">REBIRTH ($5,000)</div>
    <button class="btn" onclick="closeMenus()" style="background:red; border:none;">CLOSE</button>
</div>

<div id="settings-gui" class="menu-gui">
    <h2 style="color:var(--neon)">SYSTEM_SETTINGS</h2>
    <label>Music Volume</label><br>
    <input type="range" id="vol-music" min="0" max="100" value="50" style="width:100%"><br><br>
    <label>SFX Volume</label><br>
    <input type="range" id="vol-sfx" min="0" max="100" value="70" style="width:100%"><br><br>
    <button class="btn" onclick="closeMenus()">SAVE & EXIT</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="game.js"></script>

<script>
    function closeMenus() {
        document.getElementById('store-gui').style.display = 'none';
        document.getElementById('settings-gui').style.display = 'none';
        document.body.requestPointerLock();
    }
</script>
</body>
</html>
