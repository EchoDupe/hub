<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EchoDupe | Galactic Harvest</title>
    <link rel="icon" type="image/png" href="../assets/title.png">
    <style>
        :root { --neon: #00ffff; --gold: #ffd700; }
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background: #000; color: white; user-select: none; }
        
        #hub-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 10px 20px; background: rgba(0,0,0,0.8);
            color: var(--neon); border: 1px solid var(--neon);
            text-decoration: none; font-weight: bold; z-index: 500;
        }

        #ui {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.8); padding: 20px; 
            border-left: 5px solid var(--neon); z-index: 10;
            box-shadow: 0 0 20px rgba(0,255,255,0.1);
        }

        .menu-gui {
            display: none; position: fixed; left: 50%; top: 50%;
            transform: translate(-50%, -50%); width: 350px;
            background: rgba(0, 5, 10, 0.95); border: 2px solid var(--neon);
            padding: 30px; z-index: 1000; text-align: center;
        }

        .btn {
            width: 100%; padding: 12px; margin: 10px 0;
            background: rgba(0,255,255,0.05); border: 1px solid var(--neon);
            color: white; cursor: pointer; font-family: inherit; font-weight: bold;
        }
        .btn:hover { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }

        #prompt {
            position: absolute; bottom: 10%; width: 100%; text-align: center;
            color: var(--neon); font-size: 1em; letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon); pointer-events: none;
        }
    </style>
</head>
<body>

<a href="../index.html" id="hub-btn">BACK TO HUB</a>

<div id="ui">
    <div style="font-size: 0.7em; opacity: 0.6;">STATION_RESERVES</div>
    <div style="font-size: 2.5em; font-weight: bold; color: var(--neon);">$<span id="money">0</span></div>
    <div style="color: var(--gold); font-size: 0.9em;">REBIRTH_LEVEL: <span id="rebirths">0</span></div>
    <div style="margin-top: 10px; font-size: 0.7em; opacity: 0.5;">[K] SHOP TELEPORT | [P] SETTINGS</div>
</div>

<div id="prompt">CLICK SCREEN TO INITIALIZE CONTROLS</div>

<div id="store-gui" class="menu-gui">
    <h2 style="color:var(--neon); letter-spacing: 3px;">TRADING_POST</h2>
    <div class="btn" onclick="buyWorker()">HIRE DRONE ($<span id="w-cost">25</span>)</div>
    <div class="btn" onclick="buyAxe()">LASER POWER x2 ($<span id="a-cost">100</span>)</div>
    <div class="btn" onclick="doRebirth()" style="border-color:var(--gold); color:var(--gold);">REBIRTH ($5000)</div>
    <button class="btn" onclick="closeMenus()" style="margin-top:20px; border:none; color:grey;">CLOSE [ESC]</button>
</div>

<div id="settings-gui" class="menu-gui">
    <h2 style="color:var(--neon)">SYSTEM_SETTINGS</h2>
    <button class="btn" onclick="resetSave()" style="border-color: red; color: red;">WIPE ALL DATA</button>
    <button class="btn" onclick="closeMenus()">BACK</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="game.js"></script>

<script>
    function closeMenus() {
        document.getElementById('store-gui').style.display = 'none';
        document.getElementById('settings-gui').style.display = 'none';
        document.body.requestPointerLock();
    }
</script>
</body>
</html>
