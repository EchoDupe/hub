<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no" />
    <link rel="stylesheet" href="assets/css/app.css" type="text/css" />
    <title>EchoDupe | Basketball Legends</title>
    <link rel="icon" type="image/png" href="assets/title.png">
    
    <style>
        #return-terminal {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2147483647 !important;
            background: #000;
            border: 2px solid #06b6d4;
            color: #06b6d4;
            padding: 12px 20px;
            font-family: sans-serif;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer !important;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
            user-select: none;
            -webkit-appearance: none;
        }
        #return-terminal:hover {
            background: #06b6d4;
            color: #000;
        }
    </style>
</head>

<body style="margin:0; padding:0; background:#000;">

    <button id="return-terminal" onclick="window.location.href='https://echodupe.github.io/Games/'">
        ← EXIT_TO_HUB
    </button>

    <div id="content"></div>
    <div id="orientation"></div>
    <div id="loader">Loading ...</div>

    <script type="text/javascript" src="assets/lib/nape.min.js"></script>
    <script type="text/javascript" src="assets/lib/jquery-3.1.1.min.js"></script>
    <script type="text/javascript" src="assets/lib/easeljs-0.8.2.combined.js"></script>
    <script type="text/javascript" src="assets/lib/bluebird.min.js"></script>
    <script type="text/javascript" src="assets/lib/phaser.min.js"></script>
    <script type="text/javascript" src="assets/lib/phaser-cachebuster.min.js"></script>
    <script type="text/javascript" src="assets/lib/phaser-super-storage.min.js"></script>
    <script type="text/javascript" src="assets/lib/dragonBones.min.js"></script>

    <script type="text/javascript">
        // GLOBAL REDIRECT SCRIPT
        // This forces the button to work even if the game tries to stop it
        document.addEventListener('DOMContentLoaded', function() {
            var btn = document.getElementById('return-terminal');
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                window.location.replace("https://echodupe.github.io/Games/");
            }, true); // The 'true' here makes this trigger BEFORE the game sees the click
        });

        var useEvents = (typeof(Event) === 'function');
        var myDispatchEvent = function (name){
            var event;
            if (useEvents){
                event = new Event(name);
            }else{
                event = document.createEvent('Event');
                event.initEvent(name, true, true);
            }
            document.getElementById("content").dispatchEvent(event);
        }

        window["GD_OPTIONS"] = {
            "gameId": "3dbd133d0cd9468bafdf2c9812290f4b",
            "onEvent": function(event) {
                switch (event.name) {
                    case "SDK_GAME_START":
                        myDispatchEvent('SDK_GAME_START');
                        break;
                    case "SDK_GAME_PAUSE":
                        myDispatchEvent('SDK_GAME_PAUSE');
                        break;
                }
            },
        };

        (function(d, s, id) {
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) return;
            js = d.createElement(s);
            js.id = id;
            js.src = 'js/main.min.js'; 
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'gamedistribution-jssdk'));
    </script>

    <script type="text/javascript" src="basketball_legends_2020.min.js?22cd1e78f00425837fa0"></script>
</body>
</html>
