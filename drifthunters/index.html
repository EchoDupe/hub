<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EchoDupe | Drift Hunters</title>
    <meta name="robots" content="noindex,nofollow" />
    <meta name="description" content="Drift Hunters is an online 3D car drifting game. Race on multiple challenging racetracks and customize your cars.">
    <script type="text/javascript" src="/cloak.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <meta name="robots" content="noindex,nofollow" />
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      .webgl-content * {
        border: 0;
        margin: 0;
        padding: 0;
      }
      .webgl-content {
        position: absolute;
      }
      .webgl-content,
      #gameContainer,
      #unityContainer,
      canvas {
        width: 100% !important;
        height: 100% !important;
      }
      .webgl-content .logo,
      .progress {
        position: absolute;
        left: 50%;
        top: 50%;
        -webkit-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
      }
      .webgl-content .logo {
        background: url("progressLogo.Light.png") no-repeat center/contain;
        width: 354px;
        height: 130px;
      }
      .webgl-content .progress {
        height: 18px;
        width: 141px;
        margin-top: 90px;
      }
      .webgl-content .progress .empty {
        background: url("progressEmpty.Light.png") no-repeat right/cover;
        float: right;
        width: 100%;
        height: 100%;
        display: inline-block;
      }
      .webgl-content .progress .full {
        background: url("progressFull.Light.png") no-repeat left/cover;
        float: left;
        width: 0%;
        height: 100%;
        display: inline-block;
      }
      .webgl-content .logo.Dark {
        background-image: url(progressLogo.Dark.png);
      }
      .webgl-content .progress.Dark .empty {
        background-image: url(progressEmpty.Dark.png);
      }
      .webgl-content .progress.Dark .full {
        background-image: url(progressFull.Dark.png);
      }
      .webgl-content .footer {
        margin-top: 5px;
        height: 38px;
        line-height: 38px;
        font-family: Helvetica, Verdana, Arial, sans-serif;
        font-size: 18px;
      }
      .webgl-content .footer .webgl-logo,
      .title,
      .fullscreen {
        height: 100%;
        display: inline-block;
        background: transparent center no-repeat;
      }
      .webgl-content .footer .webgl-logo {
        background-image: url(webgl-logo.png);
        width: 204px;
        float: left;
      }
      .webgl-content .footer .title {
        margin-right: 10px;
        float: right;
      }
      .webgl-content .footer .fullscreen {
        background-image: url(fullscreen.png);
        width: 38px;
        float: right;
      }

      /* Back to Hub Button Style */
      .back-to-hub {
          position: fixed;
          bottom: 20px;
          right: 20px;
          z-index: 9999;
          background: rgba(15, 15, 20, 0.8);
          border: 1px solid rgba(6, 182, 212, 0.5);
          color: #06b6d4;
          padding: 10px 18px;
          border-radius: 12px;
          font-family: 'Helvetica', Arial, sans-serif;
          font-weight: bold;
          text-decoration: none;
          display: flex;
          align-items: center;
          gap: 8px;
          backdrop-filter: blur(10px);
          transition: all 0.3s ease;
          box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
          text-transform: uppercase;
          font-size: 11px;
          letter-spacing: 1px;
      }
      .back-to-hub:hover {
          background: #06b6d4;
          color: #000;
          box-shadow: 0 0 25px rgba(6, 182, 212, 0.6);
          transform: translateY(-2px);
      }
    </style>
  </head>
  <body style="margin: 0 auto; overflow: hidden">
  
    <a href="../index.html" class="back-to-hub">
        <i class="fa-solid fa-house"></i>
        <span>Back to Hub</span>
    </a>
  
    <div class="webgl-content">
      <div id="gameContainer" style="width: 100%; height: 100%; margin: 0;"></div>
    </div>
    
  </body>
  <script src="UnityLoader2019.js"></script>
  <script>
  
    var gameInstance = UnityLoader.instantiate("gameContainer", "dh.json");

    function UnityProgress(gameInstance, progress) {
      if (!gameInstance.Module) {
        return;
      }

    }
  </script>
</html>
