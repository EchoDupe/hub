<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>EchoDupe | HallowEcho</title>
    
    <link rel="icon" type="image/png" href="./assets/hallowecho.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; color: #fff; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: none; }

        /* HUB BUTTON */
        .back-to-hub {
            position: fixed; top: 20px; left: 20px; z-index: 10000;
            background: rgba(10, 10, 15, 0.9); border: 1px solid rgba(6, 182, 212, 0.4);
            color: #06b6d4; padding: 10px 18px; border-radius: 12px; font-weight: bold;
            text-decoration: none; display: flex; align-items: center; gap: 8px;
            backdrop-filter: blur(10px); transition: all 0.3s ease;
            font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
        }

        /* LOADER OVERLAY */
        #loader {
            position: fixed; inset: 0;
            /* Background color with a flicker animation */
            background-color: #0a0a0a; 
            display: flex; flex-direction: column; align-items: center;
            z-index: 9999;
            animation: bgFlicker 5s infinite;
        }

        /* LOGO AREA - Fixing the transparency look */
        .logo-container {
            flex: 1; /* Pushes content below to the bottom */
            display: flex; justify-content: center; align-items: center;
            width: 100%;
            /* This gives the transparent image a colored "aura" */
            background: radial-gradient(circle, rgba(6, 182, 212, 0.05) 0%, transparent 70%);
        }
        .loader-logo {
            width: 300px; height: auto;
            filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.8));
        }

        /* INITIALIZE BOX AT BOTTOM */
        .bottom-bar {
            width: 100%;
            padding-bottom: 60px; /* Distance from the very bottom */
            display: flex;
            justify-content: center;
        }
        .init-box {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            padding: 15px 60px;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        .init-box:hover {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }

        .loading-text { 
            font-size: 12px; font-weight: 900; letter-spacing: 6px; 
            color: #fff; font-family: 'Courier New', monospace;
        }

        /* ANIMATIONS */
        @keyframes bgFlicker {
            0%, 100% { background-color: #0a0a0a; }
            95% { background-color: #0a0a0a; }
            96% { background-color: #0f0f0f; }
            97% { background-color: #080808; }
            98% { background-color: #121212; }
            99% { background-color: #0a0a0a; }
        }
    </style>
</head>
<body>

    <a href="https://echodupe.github.io/Games/" class="back-to-hub">
        <i class="fa-solid fa-house"></i><span>Back to Hub</span>
    </a>

    <div id="loader">
        <div class="logo-container">
            <img src="./assets/hallowecho.png" alt="HallowEcho" class="loader-logo">
        </div>
        
        <div class="bottom-bar">
            <div class="init-box" onclick="startGame()">
                <div class="loading-text">INITIALIZE_SYSTEM</div>
            </div>
        </div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script src="map.js"></script>
    <script src="main.js"></script>

    <script>
        function startGame() {
            const loader = document.getElementById('loader');
            
            // INSTANT BLACKOUT
            loader.style.animation = "none";
            loader.style.background = "#000";
            loader.innerHTML = ""; 
            
            setTimeout(() => {
                if (window.initHallowEcho) {
                    window.initHallowEcho();
                }
                loader.style.display = 'none';
            }, 400); 
        }
    </script>
</body>
</html>
