<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoDupe | Games Hub</title>
    <link rel="icon" type="image/png" href="assets/title.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #06b6d4; }
        body { 
            background-color: #030303; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Cyber Grid Background */
        .bg-grid {
            background-size: 45px 45px;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.05) 1px, transparent 1px), 
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            position: fixed; inset: 0; z-index: -1;
        }
        .bg-glow {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 20%, rgba(6, 182, 212, 0.12) 0%, transparent 60%);
            z-index: -1; pointer-events: none;
        }

        .scanline {
            width: 100%; height: 100vh; 
            background: linear-gradient(to bottom, transparent 50%, rgba(6, 182, 212, 0.02) 50%);
            background-size: 100% 4px; position: fixed; pointer-events: none; z-index: 100;
        }

        /* Centered Layout Styling */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            width: 100%;
        }

        .game-card { 
            background: rgba(10, 10, 15, 0.8); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(6, 182, 212, 0.1);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }
        
        .game-card.active:hover { 
            border-color: var(--neon); 
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(6, 182, 212, 0.15); 
            transform: translateY(-10px); 
            cursor: pointer;
        }

        /* Loading Screen Style */
        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; flex-direction: column;
            align-items: center; justify-content: center;
            font-family: 'Courier Prime', monospace;
        }
        #bar-container { width: 280px; height: 2px; background: #111; margin-top: 25px; border-radius: 10px; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 15px var(--neon); transition: width 0.1s; }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="scanline"></div>

    <div id="loader">
        <div class="text-[10px] uppercase tracking-[0.5em] text-cyan-500 font-bold animate-pulse">Initializing_Simulation_Protocol</div>
        <div id="bar-container"><div id="bar"></div></div>
    </div>

    <nav class="w-full bg-black/40 border-b border-cyan-500/10 backdrop-blur-xl mb-12">
        <div class="max-w-7xl mx-auto flex justify-between items-center px-10 py-8">
            <h1 class="text-3xl font-black italic text-cyan-500 tracking-tighter uppercase select-none">
                ECHODUPE<span class="text-white">GAMES</span>
            </h1>
            <div class="text-[10px] font-bold text-zinc-500 tracking-widest uppercase">System: <span class="text-cyan-500">Live</span></div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6">
        
        <div class="mb-16 text-center">
            <img src="assets/title.png" alt="ECHODUPE" class="max-w-[350px] w-full h-auto drop-shadow-[0_0_30px_rgba(6,182,212,0.2)] mx-auto mb-6">
            <p class="text-[10px] font-black uppercase tracking-[1em] text-zinc-600">Active Node Selection</p>
        </div>

        <div class="game-container">
            <div class="game-card active p-10 rounded-[40px] text-center group" onclick="boot('Snake/index.html')">
                <span class="text-5xl mb-6 block group-hover:scale-110 transition-transform duration-500">🐍</span>
                <h3 class="text-2xl font-black uppercase italic group-hover:text-cyan-500 transition">Neon_Snake</h3>
                <p class="text-zinc-500 mt-2 text-[10px] font-bold tracking-widest uppercase">WASD Control Configured</p>
                <div class="mt-6 text-cyan-500 opacity-0 group-hover:opacity-100 transition-all text-[10px] font-black tracking-widest">BOOT_SIMULATION ></div>
            </div>

            <div class="mt-8 text-center">
                <div class="inline-block px-8 py-3 bg-white/5 border border-white/5 rounded-full backdrop-blur-sm">
                    <span class="text-[10px] font-black text-zinc-600 tracking-[0.5em] uppercase">Coming_Soon</span>
                </div>
            </div>
        </div>

    </main>

    <div class="fixed bottom-6 right-6 z-[60]">
        <a href="https://echodupe-hub.netlify.app" 
           target="_blank" 
           class="flex items-center gap-3 px-4 py-2 bg-black/40 backdrop-blur-md border border-cyan-500/20 rounded-full group hover:border-cyan-500/50 transition-all duration-300">
            <div class="flex flex-col items-end">
                <span class="text-[8px] font-black text-zinc-500 tracking-[0.2em] uppercase leading-none">System_Link</span>
                <span class="text-[10px] font-bold text-white group-hover:text-cyan-400 transition-colors uppercase italic">EchoDupe_Hub</span>
            </div>
            <div class="w-8 h-8 rounded-full border border-cyan-500/20 flex items-center justify-center group-hover:bg-cyan-500/10 transition-all">
                <i class="fa-solid fa-arrow-up-right-from-square text-[10px] text-cyan-500"></i>
            </div>
        </a>
    </div>

    <footer class="py-24 border-t border-cyan-500/10 mt-24">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-[9px] font-black uppercase tracking-[0.4em] text-zinc-600 mb-2">
                &copy; 2026 ECHODUPE INDUSTRIES.
            </p>
            <p class="text-[9px] font-black uppercase tracking-[0.4em] text-zinc-800">
                Maintained by <span class="text-cyan-500/50">Skitxoe</span>
            </p>
        </div>
    </footer>

    <script>
        function boot(url) {
            const loader = document.getElementById('loader');
            const bar = document.getElementById('bar');
            loader.style.display = 'flex';
            let progress = 0;
            const interval = setInterval(() => {
                if (progress >= 100) {
                    clearInterval(interval);
                    window.location.href = url;
                } else {
                    progress += Math.random() * 25;
                    bar.style.width = Math.min(progress, 100) + '%';
                }
            }, 100);
        }
    </script>
</body>
</html>
