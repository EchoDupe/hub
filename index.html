<!DOCTYPE html>
<html>
<head>
    <title>EchoDupe Tycoon v5</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        
        /* Main Menu Styling */
        #menu-overlay {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: white;
        }
        #play-btn {
            padding: 20px 60px; font-size: 24px; font-weight: bold;
            background: #00ff88; border: none; border-radius: 50px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 0 20px rgba(0,255,136,0.4);
        }
        #play-btn:hover { transform: scale(1.1); background: #00cc6e; }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 8px; height: 8px; background: white;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; opacity: 0.5;
        }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: white; background: rgba(0,0,0,0.8);
            padding: 15px; border-radius: 10px; border-left: 5px solid #00ff88;
            display: none; /* Hidden until play */
        }
        #shop-gui {
            display: none;
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            width: 320px; background: #1a1a1a; color: white;
            padding: 25px; border-radius: 15px; border: 3px solid #3399ff;
            text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
        .btn {
            background: #3399ff; color: white; border: none;
            padding: 12px; width: 100%; margin-top: 10px;
            cursor: pointer; border-radius: 8px; font-weight: bold;
        }
        .btn:hover { background: #55aaff; }
        .btn:disabled { background: #444; color: #888; }
        #msg { position: absolute; bottom: 15%; width: 100%; text-align: center; color: #00ff88; font-weight: bold; pointer-events: none; display: none;}
    </style>
</head>
<body>

<div id="menu-overlay">
    <h1 style="color: #00ff88; font-size: 50px; margin-bottom: 10px;">ECHODUPE TYCOON</h1>
    <p style="color: #aaa; margin-bottom: 30px;">Progress is saved automatically!</p>
    <button id="play-btn" onclick="startGame()">PLAY</button>
</div>

<div id="crosshair"></div>
<div id="msg">Click the Blue Shop to Upgrade</div>

<div id="ui">
    <b style="font-size: 20px; color: #00ff88;">Tycoon Bank</b><br>
    <span style="font-size: 24px;">$<span id="money">0</span></span><br>
    <small style="color: #aaa;">Workers: <span id="workerCount">0</span></small>
</div>

<div id="shop-gui">
    <h2 style="margin:0; color: #3399ff;">Shop</h2>
    <div style="margin: 15px 0;">
        <button class="btn" id="buyWorker" onclick="buyWorker()">Worker: $25</button>
    </div>
    <div style="margin: 15px 0;">
        <button class="btn" id="buyBoost" onclick="buyBoost()">Multiplier: $100</button>
    </div>
    <button class="btn" onclick="resetGame()" style="background: #333; font-size: 10px; margin-top: 20px;">Wipe Save Data</button>
    <br>
    <button class="btn" id="close-btn" onclick="closeShop()" style="background: #ff4444; width: 50%;">Close</button>
</div>

<script>
let gameStarted = false;
let stats = { money: 20, workers: 0, mult: 1, wPrice: 25, bPrice: 100 };

// --- SAVE SYSTEM ---
function saveGame() {
    localStorage.setItem('echoDupeSave', JSON.stringify(stats));
}

function loadGame() {
    const saved = localStorage.getItem('echoDupeSave');
    if (saved) {
        stats = JSON.parse(saved);
        // Spawn workers based on saved count
        for(let i=0; i<stats.workers; i++) spawnWorker();
    }
}

function resetGame() {
    if(confirm("Are you sure you want to reset everything?")) {
        localStorage.removeItem('echoDupeSave');
        location.reload();
    }
}

// --- ENGINE SETUP ---
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
let light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
scene.add(light);

// World
let ground = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshStandardMaterial({color: 0x348C31}));
ground.rotation.x = -Math.PI/2;
scene.add(ground);

let path = new THREE.Mesh(new THREE.PlaneGeometry(10, 300), new THREE.MeshStandardMaterial({color: 0x765c48}));
path.rotation.x = -Math.PI/2;
path.position.y = 0.01;
scene.add(path);

// Shop
let shopGroup = new THREE.Group();
let walls = new THREE.Mesh(new THREE.BoxGeometry(10, 7, 10), new THREE.MeshStandardMaterial({color: 0x3399ff}));
walls.position.y = 3.5;
let roof = new THREE.Mesh(new THREE.ConeGeometry(9, 5, 4), new THREE.MeshStandardMaterial({color: 0x222222}));
roof.position.y = 9.5;
roof.rotation.y = Math.PI/4;
shopGroup.add(walls, roof);
shopGroup.position.set(0, 0, -25);
scene.add(shopGroup);

// Trees
let trees = [];
for(let i=0; i<80; i++) {
    let tree = new THREE.Group();
    let t = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 3), new THREE.MeshStandardMaterial({color: 0x5D4037}));
    t.position.y = 1.5;
    let l = new THREE.Mesh(new THREE.SphereGeometry(2, 6, 6), new THREE.MeshStandardMaterial({color: 0x2E7D32}));
    l.position.y = 4;
    tree.add(t, l);
    let rx = (Math.random()-0.5)*180;
    let rz = (Math.random()-0.5)*180;
    if(Math.abs(rx) < 10) rx += 20; 
    tree.position.set(rx, 0, rz);
    scene.add(tree);
    trees.push({obj: tree, x: rx, z: rz});
}

// --- GAMEPLAY ---
let workerNPCs = [];
function spawnWorker() {
    let npc = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshStandardMaterial({color: 0xffff00}));
    npc.position.set(0, 1, -25);
    scene.add(npc);
    workerNPCs.push({ mesh: npc, targetX: (Math.random()-0.5)*50, targetZ: (Math.random()-0.5)*50 - 20 });
}

function buyWorker() {
    if(stats.money >= stats.wPrice) {
        stats.money -= stats.wPrice;
        stats.workers++;
        stats.wPrice = Math.floor(stats.wPrice * 1.3);
        spawnWorker();
        saveGame();
    }
}

function buyBoost() {
    if(stats.money >= stats.bPrice) {
        stats.money -= stats.bPrice;
        stats.mult += 0.5;
        stats.bPrice = Math.floor(stats.bPrice * 2);
        saveGame();
    }
}

function startGame() {
    loadGame();
    gameStarted = true;
    document.getElementById("menu-overlay").style.display = "none";
    document.getElementById("ui").style.display = "block";
    document.getElementById("msg").style.display = "block";
    document.body.requestPointerLock();
}

function closeShop() {
    document.getElementById("shop-gui").style.display = "none";
    document.body.requestPointerLock();
}

// Controls
let player = { x:0, z:10, yaw:0 };
let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
document.addEventListener("mousemove", e => {
    if(document.pointerLockElement === document.body) {
        player.yaw -= e.movementX * 0.002;
        camera.rotation.set(0, player.yaw, 0);
    }
});
document.addEventListener("mousedown", () => {
    if(!gameStarted) return;
    let distToShop = Math.sqrt(player.x**2 + (player.z + 25)**2);
    if(distToShop < 12) {
        document.exitPointerLock();
        document.getElementById("shop-gui").style.display = "block";
    }
});

function update() {
    if(!gameStarted) return;
    let speed = 0.22;
    if(keys["w"]) { player.x -= Math.sin(player.yaw) * speed; player.z -= Math.cos(player.yaw) * speed; }
    if(keys["s"]) { player.x += Math.sin(player.yaw) * speed; player.z += Math.cos(player.yaw) * speed; }
    if(keys["a"]) { player.x -= Math.cos(player.yaw) * speed; player.z += Math.sin(player.yaw) * speed; }
    if(keys["d"]) { player.x += Math.cos(player.yaw) * speed; player.z -= Math.cos(player.yaw) * speed; }

    camera.position.set(player.x, 3, player.z);

    trees.forEach(tree => {
        let d = Math.sqrt((player.x - tree.x)**2 + (player.z - tree.z)**2);
        if(d < 3) {
            stats.money += 15 * stats.mult; 
            tree.obj.position.x = (Math.random()-0.5)*180;
            tree.obj.position.z = (Math.random()-0.5)*180;
            tree.x = tree.obj.position.x; tree.z = tree.obj.position.z;
            saveGame(); // Save every time you get money
        }
    });

    workerNPCs.forEach(npc => {
        let dx = npc.targetX - npc.mesh.position.x;
        let dz = npc.targetZ - npc.mesh.position.z;
        let dist = Math.sqrt(dx*dx + dz*dz);
        if(dist > 0.5) {
            npc.mesh.position.x += (dx/dist) * 0.1;
            npc.mesh.position.z += (dz/dist) * 0.1;
        } else {
            npc.targetX = (Math.random()-0.5)*80;
            npc.targetZ = (Math.random()-0.5)*80 - 20;
        }
        stats.money += 0.01 * stats.mult; 
    });

    document.getElementById("money").innerText = Math.floor(stats.money);
    document.getElementById("workerCount").innerText = stats.workers;
    document.getElementById("buyWorker").innerText = "Worker: $" + stats.wPrice;
    document.getElementById("buyBoost").innerText = "Multiplier: $" + stats.bPrice;
    document.getElementById("buyWorker").disabled = stats.money < stats.wPrice;
    document.getElementById("buyBoost").disabled = stats.money < stats.bPrice;
}

function animate() {
    update();
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
