<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoDupe | Games Hub</title>
    
    <link rel="icon" type="image/png" href="assets/title.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --neon: #06b6d4; 
            --dark: #050505; 
        }

        body { 
            background-color: #020202; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            padding-bottom: 80px;
            margin: 0;
        }

        /* Background Effects */
        .bg-grid {
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.07) 1px, transparent 1px), 
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.07) 1px, transparent 1px);
            position: fixed; 
            inset: 0; 
            z-index: -1;
        }
        .bg-glow {
            position: fixed; 
            inset: 0;
            background: radial-gradient(circle at 50% -10%, rgba(6, 182, 212, 0.15) 0%, transparent 50%);
            z-index: -1;
        }

        /* Typography */
        .brand-header {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 900;
            font-size: 3.5rem;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            line-height: 1;
        }
        .brand-cyan {
            color: var(--neon);
            text-shadow: 0 0 20px rgba(6, 182, 212, 0.6);
        }
        .brand-white {
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* Search & Filter UI */
        #filter-interface {
            max-width: 700px;
            width: 90%;
            margin: 0 auto 50px auto;
            text-align: center;
        }
        #game-search {
            width: 100%;
            background: rgba(15, 15, 20, 0.8);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 12px;
            padding: 12px 20px 12px 45px;
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            outline: none;
            transition: all 0.3s;
        }
        #game-search:focus {
            border-color: var(--neon);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
        }
        .category-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 15px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            color: #888;
        }
        .category-btn.active, .category-btn:hover {
            border-color: var(--neon);
            color: var(--neon);
            background: rgba(6, 182, 212, 0.1);
        }

        /* Game Cards */
        .game-card {
            position: relative;
            width: 200px;
            height: 240px;
            background: linear-gradient(145deg, rgba(15, 15, 20, 0.9), rgba(5, 5, 5, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            text-decoration: none;
            backdrop-filter: blur(10px);
        }
        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--neon);
            box-shadow: 0 20px 40px rgba(6, 182, 212, 0.15);
        }
        .icon-box {
            width: 80px; 
            height: 80px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(6, 182, 212, 0.1);
            border-radius: 18px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            margin-bottom: 20px; 
            padding: 12px;
            overflow: hidden;
        }
        .icon-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }
        .glitch-text { 
            font-family: 'Space Grotesk', sans-serif; 
            font-weight: 700; 
            text-align: center;
        }

        .sub-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.2;
        }

        .version-footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 2px;
            pointer-events: none;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <header class="pt-16 pb-8 flex flex-col items-center">
        <h1 class="brand-header mb-8">
            <span class="brand-cyan">ECHODUPE</span><span class="brand-white">GAMES</span>
        </h1>
        
        <div id="filter-interface">
            <div class="relative mb-6">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-cyan-500/50"></i>
                <input type="text" id="game-search" placeholder="Search Simulation Nodes...">
            </div>
            
            <div id="category-bar" class="flex flex-wrap justify-center gap-2">
                <button class="category-btn active" data-filter="all">All_Games</button>
                <button class="category-btn" data-filter="sports">Sports</button>
                <button class="category-btn" data-filter="simulators">Simulators</button>
                <button class="category-btn" data-filter="action">Action</button>
                <button class="category-btn" data-filter="horror">Horror</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6">
        <section class="pb-20">
            <div id="game-grid" class="flex flex-wrap justify-center gap-8">
                
                <a href="basketball-legends/index.html" class="game-card" data-name="basketball legends" data-category="sports">
                    <div class="icon-box"><img src="basketball-legends/assets/images/logo.png" alt="Basketball Legends"></div>
                    <span class="glitch-text text-sm text-white mb-1">BASKETBALL LEGENDS</span>
                    <div class="sub-label">
                        <span class="text-[8px] font-bold text-cyan-500/60 tracking-[0.1em] uppercase">Sports</span>
                    </div>
                </a>

                <a href="basketball-stars/index.html" class="game-card" data-name="basketball stars" data-category="sports">
                    <div class="icon-box"><img src="basketball-stars/basketballstars.png" alt="Basketball Stars"></div>
                    <span class="glitch-text text-sm text-white mb-1">BASKETBALL STARS</span>
                    <div class="sub-label">
                        <span class="text-[8px] font-bold text-cyan-500/60 tracking-[0.1em] uppercase">Sports</span>
                    </div>
                </a>

                <a href="cookieclicker/index.html" class="game-card" data-name="cookie clicker" data-category="simulators">
                    <div class="icon-box"><img src="cookieclicker/img/perfectCookie.png" alt="Cookie Clicker"></div>
                    <span class="glitch-text text-sm text-white mb-1">COOKIE CLICKER</span>
                    <div class="sub-label">
                        <span class="text-[8px] font-bold text-cyan-500/60 tracking-[0.1em] uppercase">Simulator</span>
                    </div>
                </a>

                <a href="tunnelrush/index.html" class="game-card" data-name="tunnel rush" data-category="action">
                    <div class="icon-box"><img src="tunnelrush/img/tunnel.jpg" alt="Tunnel Rush"></div>
                    <span class="glitch-text text-sm text-white mb-1">TUNNEL RUSH</span>
                    <div class="sub-label">
                        <span class="text-[8px] font-bold text-cyan-500/60 tracking-[0.1em] uppercase">Action</span>
                    </div>
                </a>

                <a href="drivemad/index.html" class="game-card" data-name="drive mad" data-category="simulators">
                    <div class="icon-box"><img src="drivemad/logo.jpg" alt="Drive Mad"></div>
                    <span class="glitch-text text-sm text-white mb-1">DRIVE MAD</span>
                    <div class="sub-label">
                        <span class="text-[8px] font-bold text-cyan-500/60 tracking-[0.1em] uppercase">Simulator</span>
                    </div>
                </a>

                <a href="retrobowl/index.html" class="game-card" data-name="retro bowl" data-category="sports">
                    <div class="icon-box"><img src="retrobowl/img/icon.jpg" alt="Retro Bowl"></div>
                    <span class="glitch-text text-sm text-white mb-1">RETRO BOWL</span>
                    <div class="sub-label">
                        <span class="text-[8px] font-bold text-cyan-500/60 tracking-[0.1em] uppercase">Sports</span>
                    </div>
                </a>

                <a href="monkeymart/index.html" class="game-card" data-name="monkey mart" data-category="simulators">
                    <div class="icon-box"><img src="monkeymart/bg_loading.png" alt="Monkey Mart"></div>
                    <span class="glitch-text text-sm text-white mb-1">MONKEY MART</span>
                    <div class="sub-label">
                        <span class="text-[8px] font-bold text-cyan-500/60 tracking-[0.1em] uppercase">Simulator</span>
                    </div>
                </a>

                <a href="drifthunters/index.html" class="game-card" data-name="drift hunters" data-category="simulators">
                    <div class="icon-box"><img src="drifthunters/logo.png" alt="Drift Hunters"></div>
                    <span class="glitch-text text-sm text-white mb-1">DRIFT HUNTERS</span>
                    <div class="sub-label">
                        <span class="text-[8px] font-bold text-cyan-500/60 tracking-[0.1em] uppercase">Simulator</span>
                    </div>
                </a>

                <div id="init-node" class="game-card opacity-20 grayscale cursor-not-allowed">
                    <div class="icon-box border-dashed border-zinc-700"><i class="fa-solid fa-plus text-2xl text-zinc-700"></i></div>
                    <span class="text-[10px] font-bold text-zinc-600 tracking-widest uppercase">Initializing...</span>
                </div>

            </div>
        </section>
    </main>

    <footer class="version-footer">
        System_Status: <span id="app-version">Online</span>
    </footer>

    <script>
        const searchInput = document.getElementById('game-search');
        const categoryBtns = document.querySelectorAll('.category-btn');
        const grid = document.getElementById('game-grid');
        const initNode = document.getElementById('init-node');
        let currentCategory = 'all';

        // Alphabetical Sort Logic
        function sortGames() {
            const cards = Array.from(grid.querySelectorAll('.game-card[data-name]'));
            cards.sort((a, b) => {
                const nameA = a.getAttribute('data-name').toLowerCase();
                const nameB = b.getAttribute('data-name').toLowerCase();
                return nameA.localeCompare(nameB);
            });
            
            // Re-append sorted cards
            cards.forEach(card => grid.appendChild(card));
            // Ensure Initializing node is always last
            grid.appendChild(initNode);
        }

        function filterGames() {
            const query = searchInput.value.toLowerCase();
            const gameCards = grid.querySelectorAll('.game-card[data-name]');
            
            gameCards.forEach(card => {
                const name = card.getAttribute('data-name');
                const category = card.getAttribute('data-category');
                const matchesSearch = name.includes(query);
                const matchesCategory = currentCategory === 'all' || category === currentCategory;

                card.style.display = (matchesSearch && matchesCategory) ? 'flex' : 'none';
            });

            if (query.length > 0 || currentCategory !== 'all') {
                initNode.style.display = 'none';
            } else {
                initNode.style.display = 'flex';
            }
        }

        // Run sort on load
        window.addEventListener('DOMContentLoaded', sortGames);

        searchInput.addEventListener('input', filterGames);

        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.getAttribute('data-filter');
                filterGames();
            });
        });
    </script>
</body>
</html>
