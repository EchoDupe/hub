<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoDupe | Games Hub</title>
    <link rel="icon" type="image/png" href="assets/title.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #06b6d4; }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* The Cyber Grid Background */
        .bg-grid {
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.07) 1px, transparent 1px), 
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.07) 1px, transparent 1px);
            position: fixed; inset: 0; z-index: -1;
        }
        .bg-glow {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% -20%, rgba(6, 182, 212, 0.15) 0%, transparent 50%);
            z-index: -1; pointer-events: none;
        }

        /* Game Card Styling */
        .game-card { 
            background: rgba(5, 5, 5, 0.8); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(6, 182, 212, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .game-card:hover { 
            border-color: var(--neon); 
            box-shadow: 0 0 40px rgba(6, 182, 212, 0.2); 
            transform: translateY(-8px) scale(1.02); 
        }

        /* Loading Screen Style */
        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; flex-direction: column;
            align-items: center; justify-content: center;
            font-family: 'Courier Prime', monospace;
        }
        #bar-container { width: 280px; height: 4px; border: 1px solid #111; margin-top: 25px; border-radius: 10px; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 15px var(--neon); transition: width 0.1s; }

        .scanline {
            width: 100%; height: 2px; background: rgba(6, 182, 212, 0.1);
            position: fixed; top: 0; left: 0; pointer-events: none; z-index: 50;
            animation: move-scanline 8s linear infinite;
        }
        @keyframes move-scanline { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="scanline"></div>

    <div id="loader">
        <div class="text-[10px] uppercase tracking-[0.5em] text-cyan-500 font-bold animate-pulse">Initializing_Simulation_Protocol</div>
        <div id="bar-container"><div id="bar"></div></div>
    </div>

    <nav class="w-full bg-black/50 border-b border-cyan-500/10 backdrop-blur-xl mb-16">
        <div class="max-w-7xl mx-auto flex justify-center items-center p-8">
            <h1 class="text-4xl font-black italic text-cyan-500 tracking-tighter uppercase select-none">
                ECHODUPE<span class="text-white">GAMES</span>
            </h1>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 flex flex-col items-center">
        
        <div class="mb-20 text-center">
            <img src="assets/title.png" alt="ECHODUPE" class="max-w-[450px] w-full h-auto drop-shadow-[0_0_25px_rgba(6,182,212,0.3)] mx-auto">
            <p class="text-[10px] font-black uppercase tracking-[1em] text-zinc-500 mt-6">Select Environment</p>
        </div>

        <div id="game-grid" class="flex justify-center w-full">
            
            <div class="game-card p-10 rounded-[35px] text-center group max-w-sm w-full" onclick="boot('Snake/index.html')">
                <span class="text-4xl mb-4 block group-hover:scale-125 transition-transform duration-500">🐍</span>
                <h3 class="text-3xl font-black uppercase italic group-hover:text-cyan-500 transition">Neon Snake</h3>
                <p class="text-zinc-500 mt-2 text-xs font-bold tracking-widest uppercase">Arcade_Simulation_v2.0</p>
            </div>

        </div>

    </main>

    <footer class="py-20 border-t border-cyan-500/10 mt-32">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-[9px] font-black uppercase tracking-[0.4em] text-zinc-500 mb-2">
                &copy; 2026 ECHODUPE INDUSTRIES.
            </p>
            <p class="text-[9px] font-black uppercase tracking-[0.4em] text-zinc-700">
                System Maintained by <span class="text-cyan-500">Skitxoe</span>
            </p>
        </div>
    </footer>

    <script>
        function boot(url) {
            const loader = document.getElementById('loader');
            const bar = document.getElementById('bar');
            
            loader.style.display = 'flex';
            
            let progress = 0;
            const interval = setInterval(() => {
                if (progress >= 100) {
                    clearInterval(interval);
                    window.location.href = url;
                } else {
                    progress += Math.random() * 25;
                    bar.style.width = Math.min(progress, 100) + '%';
                }
            }, 120);
        }
    </script>
</body>
</html>
