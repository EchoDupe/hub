<!DOCTYPE html>
<html>
<head>
    <title>EchoDupe | Network</title>
    <link rel="icon" type="image/png" href="assets/logo.png">

    <style>
        :root { --neon: #00ffff; --bg: #000a0a; --dark-gray: #555555; }
        
        body { 
            background: var(--bg); color: var(--neon); 
            font-family: 'Courier New', monospace; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden; 
        }

        /* Static Scanlines (No blinking) */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 200; background-size: 100% 4px; pointer-events: none;
        }

        .container { 
            border: 1px solid var(--neon); padding: 40px; 
            background: rgba(0, 10, 10, 0.9); 
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1); 
            text-align: center; max-width: 700px; z-index: 10;
        }

        #title-img {
            width: 100%; max-width: 550px; height: auto;
            margin-bottom: 20px; 
            filter: drop-shadow(0 0 8px var(--neon));
        }

        .menu { display: grid; gap: 15px; width: 100%; }
        
        .game-link {
            text-decoration: none; color: var(--neon); border: 1px solid var(--neon);
            padding: 15px; transition: 0.2s; font-weight: bold; 
            text-transform: uppercase; letter-spacing: 3px; cursor: pointer;
        }

        .game-link:hover { 
            background: var(--neon); color: #000; 
            box-shadow: 0 0 20px var(--neon); 
        }

        .footer { margin-top: 40px; font-size: 0.8em; letter-spacing: 1px; }
        .footer span { color: var(--dark-gray); }
        .footer b { color: var(--neon); }

        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 300; flex-direction: column;
            align-items: center; justify-content: center;
        }

        #bar-container { width: 300px; height: 10px; border: 1px solid var(--neon); }
        #bar { width: 0%; height: 100%; background: var(--neon); }
    </style>
</head>
<body>

<div id="loader">
    <div style="font-size: 1.5em; margin-bottom: 20px; letter-spacing: 5px;">INITIALIZING...</div>
    <div id="bar-container"><div id="bar"></div></div>
</div>

<div class="container">
    <img src="assets/title.png" id="title-img" alt="ECHODUPE NETWORK">
    
    <div class="menu">
        <div onclick="boot('v6-5/index.html')" class="game-link">Boot Simulation V6.5</div>
        <div onclick="boot('v6-4/index.html')" class="game-link">Boot Simulation V6.4</div>
    </div>

    <div class="footer">
        <span>DEVELOPED AND DESIGNED BY </span><b>SKITXOE</b>
    </div>
</div>

<script>
    function boot(url) {
        document.getElementById('loader').style.display = 'flex';
        let width = 0;
        const bar = document.getElementById('bar');
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                window.location.href = url;
            } else {
                width += Math.random() * 25;
                bar.style.width = Math.min(width, 100) + '%';
            }
        }, 80);
    }
</script>

</body>
</html>
