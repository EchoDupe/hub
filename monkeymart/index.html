<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="robots" content="noindex,nofollow" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, minimal-ui, shrink-to-fit=no">
        <meta name="apple-mobile-web-app-capable" content="yes">
        
        <title>EchoDupe | Monkey Mart</title>
        <link rel="icon" type="image/png" href="assets/title.png">

        <meta name="description" content="Monkey Mart is a fun game that you can play at school from chromebook. In our catalog you can find many cool online games that you may enjoy.">
        <script type="text/javascript" src="Jump_Game.js"></script>
        <style type="text/css">
            body {
                position: fixed;
                margin: 0;
                padding: 0;
                background-color: #ffffff;
            }

            .canvas-app-container {
                width: 100%;
                height: 100%;
                position: absolute;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                background: #00BB61;
            }

            #canvas {
                outline: none;
                border: 0;
                width: 100%;
                vertical-align: bottom;
                background-image: url("bg_loading.png");
                background-size: cover;
                background-position: top;
            }

            /* FLOATING HUB BUTTON - SITS ON TOP WITHOUT BREAKING ENGINE */
            #hub-overlay {
                position: fixed;
                top: 15px;
                right: 15px;
                z-index: 999999;
            }
            #hub-overlay button {
                background: rgba(0, 0, 0, 0.8);
                border: 1px solid #06b6d4;
                color: #06b6d4;
                padding: 8px 15px;
                font-family: sans-serif;
                font-size: 11px;
                font-weight: 900;
                text-transform: uppercase;
                cursor: pointer;
                box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
            }

            .buttons-background { display: none; }
        </style>
    </head>
    <body>
        <div id="hub-overlay">
            <button onclick="window.location.replace('https://echodupe.github.io/Games/')">Back to Hub</button>
        </div>

        <div id="app-container" class="canvas-app-container">
            <div id="canvas-container" class="canvas-app-canvas-container">
                <canvas id="canvas" class="canvas-app-canvas" tabindex="1" width="960" height="640"></canvas>
            </div>
            <div id="progress-bar-root" style="position: absolute; bottom: 16%; left: 50%; visibility: hidden; z-index: 4;">
                <img id="progress-bar-bg" src="load_bar_bg.png">
                <img id="progress-bar-fg" src="load_bar_fg.png" style="position:absolute; clip: rect(0px,0px,0px,0px);">
            </div>
        </div>

        <script id="engine-loader" type="text/javascript" src="dmloader.js"></script>
        
        <script id="engine-setup" type="text/javascript">
            var extra_params = {
                archive_location_filter: function(path) { return ("archive" + path + ""); },
                engine_arguments: ["--verify-graphics-calls=false", ],
                custom_heap_size: 67108864,
                full_screen_container: "#canvas-container",
                disable_context_menu: true
            }
            Module['INITIAL_MEMORY'] = extra_params.custom_heap_size;
            Module['onRuntimeInitialized'] = function() { Module.runApp("canvas", extra_params); };
            Module["locateFile"] = function(path, scriptDirectory) {
                if (path == "dmengine.wasm" || path == "dmengine_release.wasm" || path == "dmengine_headless.wasm") { path = "MonkeyMart.wasm"; }
                return scriptDirectory + path;
            };

            var is_iOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            var buttonHeight = 0;
            var prevInnerWidth = -1;
            var prevInnerHeight = -1;

            function resize_game_canvas() {
                if (is_iOS) { window.scrollTo(0, 0); }
                var app_container = document.getElementById('app-container');
                var game_canvas = document.getElementById('canvas');
                var progress_bar_root = document.getElementById('progress-bar-root');
                var progress_bar_fg = document.getElementById('progress-bar-fg');
                var progress_bar_bg = document.getElementById('progress-bar-bg');
                var innerWidth = window.innerWidth;
                var innerHeight = window.innerHeight;
                if (prevInnerWidth == innerWidth && prevInnerHeight == innerHeight) { return; }
                prevInnerWidth = innerWidth;
                prevInnerHeight = innerHeight;
                app_container.style.width = innerWidth + "px";
                app_container.style.height = innerHeight + "px";
                game_canvas.width = innerWidth;
                game_canvas.height = innerHeight;
                var bar_h = innerWidth < innerHeight ? innerWidth : innerHeight;
                progress_bar_bg.width = Math.min(Math.ceil(bar_h * 0.06 * 300 / 24), innerWidth * 0.8);
                progress_bar_bg.style.marginLeft = -progress_bar_bg.width / 2 + "px";
                progress_bar_fg.width = Math.ceil(progress_bar_bg.width * 1);
                progress_bar_fg.style.marginLeft = -progress_bar_bg.width / 2 - progress_bar_fg.width / 2 + "px";
                progress_bar_root.style.bottom = Math.ceil(innerHeight * 0.08) + "px";
            }
            resize_game_canvas();
            window.addEventListener('resize', resize_game_canvas, false);
            window.addEventListener('orientationchange', resize_game_canvas, false);
            window.addEventListener('focus', resize_game_canvas, false);

            !function() {
                var r = function(r) {
                    for (var n = "", t = 7; t >= 0; t--)
                        n += "0123456789abcdef".charAt(r >> 4 * t & 15);
                    return n
                }, n = function(r, n) {
                    var t = (65535 & r) + (65535 & n);
                    return (r >> 16) + (n >> 16) + (t >> 16) << 16 | 65535 & t
                }, e = function(r, n) {
                    return r << n | r >>> 32 - n
                }, o = function(r, n, t, e) {
                    return r < 20 ? n & t | ~n & e : r < 40 ? n ^ t ^ e : r < 60 ? n & t | n & e | t & e : n ^ t ^ e
                }, u = function(r) {
                    return r < 20 ? 1518500249 : r < 40 ? 1859775393 : r < 60 ? -1894007588 : -899497514
                };
                window._HashSHA1 = function(f) {
                    for (var a = function(r) {
                        for (var n = 1 + (r.length + 8 >> 6), t = new Array(16 * n), e = 0; e < 16 * n; e++)
                            t[e] = 0;
                        for (e = 0; e < r.length; e++)
                            t[e >> 2] |= r.charCodeAt(e) << 24 - e % 4 * 8;
                        return t[e >> 2] |= 128 << 24 - e % 4 * 8,
                        t[16 * n - 1] = 8 * r.length,
                        t
                    }(f), c = new Array(80), i = 1732584193, h = -271733879, v = -1732584194, A = 271733878, g = -1009589776, l = 0; l < a.length; l += 16) {
                        for (var w = i, d = h, y = v, H = A, b = g, s = 0; s < 80; s++)
                            c[s] = s < 16 ? a[l + s] : e(c[s - 3] ^ c[s - 8] ^ c[s - 14] ^ c[s - 16], 1),
                            t = n(n(e(i, 5), o(s, h, v, A)), n(n(g, c[s]), u(s))),
                            g = A, A = v, v = e(h, 30), h = i, i = t;
                        i = n(i, w), h = n(h, d), v = n(v, y), A = n(A, H), g = n(g, b)
                    }
                    return r(i) + r(h) + r(v) + r(A) + r(g)
                }
            }();

            var old_preloadAndCallMain = Module._preloadAndCallMain;
            Module._preloadAndCallMain = function() {
                var dir = DMSYS.GetUserPersistentDataRoot();
                var resDir = _HashSHA1("MonkeyMart");
                try { FS.unlink(dir + "/." + resDir + "/liveupdate.arcd"); } catch (e) {}
                try { FS.unlink(dir + "/." + resDir + "/liveupdate.arci"); } catch (e) {}
                try { FS.unlink(dir + "/." + resDir + "/liveupdate.arci.tmp"); } catch (e) {}
                old_preloadAndCallMain();
            };
        </script>

        <script id="engine-start" type="text/javascript">
            Progress.updateProgress = function(percentage) {
                var fg = document.getElementById('progress-bar-fg');
                fg.style.clip = "rect(0px," + fg.width * percentage / 100 + "px," + fg.height + "px," + "0px)"
                if (isNaN(percentage)) { document.getElementById('progress-bar-root').style.visibility = "hidden"; }
            };
            Progress.addProgress = function() { document.getElementById('progress-bar-root').style.visibility = "visible" }
            Progress.removeProgress = function() { document.getElementById('progress-bar-root').style.visibility = "hidden"; }
            EngineLoader.load("canvas", "MonkeyMart");
        </script>
        <script type="text/javascript" src="GameAnalytics.js"></script>
    </body>
</html>
